<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="#1a1a2e"/>

  <!-- House body -->
  <polygon points="16,5 27,14 27,28 5,28 5,14" fill="#16213e"/>
  <polygon points="16,5 27,14 27,28 5,28 5,14" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Roof ridge cap -->
  <polyline points="5,14 16,5 27,14" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Door -->
  <rect x="13" y="20" width="6" height="8" rx="1" fill="#0f3460" stroke="#4fc3f7" stroke-width="0.8"/>

  <!-- Window (left) -->
  <rect x="7" y="17" width="4" height="4" rx="0.5" fill="#4fc3f7" opacity="0.7"/>

  <!-- Window (right) -->
  <rect x="21" y="17" width="4" height="4" rx="0.5" fill="#4fc3f7" opacity="0.7"/>

  <!-- WiFi / wireless signal arcs centered above house, inside roof area -->
  <circle cx="16" cy="12" r="1.2" fill="#e94560"/>
  <path d="M13.5,11 a3.5,3.5 0 0 1 5,0" fill="none" stroke="#e94560" stroke-width="1" stroke-linecap="round"/>
  <path d="M11.5,9.2 a6,6 0 0 1 9,0" fill="none" stroke="#e94560" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
