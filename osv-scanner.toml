[[PackageOverrides]]
name = "atomic-polyfill"
ecosystem = "crates.io"
ignore = true
reason = "Stale lock entry — not in any dependency tree"

[[PackageOverrides]]
name = "rsa"
ecosystem = "crates.io"
ignore = true
reason = "Stale lock entry — not in any dependency tree"

[[PackageOverrides]]
name = "paste"
ecosystem = "crates.io"
ignore = true
reason = "Compile-time proc macro only — no runtime impact"

[[PackageOverrides]]
name = "proc-macro-error"
ecosystem = "crates.io"
ignore = true
reason = "Compile-time proc macro only — no runtime impact"

[[PackageOverrides]]
name = "bincode"
ecosystem = "crates.io"
ignore = true
reason = "WASM frontend only (gloo-worker); unmaintained but no known vulns"

[[PackageOverrides]]
name = "rustls-pemfile"
ecosystem = "crates.io"
ignore = true
reason = "Unmaintained but no known security bugs; used by rumqttc for local TLS certs"

[[PackageOverrides]]
name = "rustls-webpki"
ecosystem = "crates.io"
version = "0.102.8"
vulnerability.ignore = true
reason = "All CVEs are CRL/cert-chain issues requiring either compromised CA or misissued certs. MQTT uses local broker. Pinned by rumqttc — can't update to 0.103.x."


